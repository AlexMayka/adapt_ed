      created_at:
        description: Дата создания
        example: "2026-03-16T10:30:00Z"
        type: string
      email:
        description: Email пользователя
        example: example@example.com
        type: string
      first_name:
        description: Имя
        example: Иван
        type: string
      id:
        description: UUID пользователя
        example: 10cb44c1-18f7-4a3e-b0bd-5d2609619d65
        type: string
      is_active:
        description: Признак активности
        example: true
        type: boolean
      last_name:
        description: Фамилия
        example: Иванов
        type: string
      middle_name:
        description: Отчество
        example: Иванович
        type: string
      role:
        allOf:
        - $ref: '#/definitions/dto.UserRole'
        description: Роль пользователя
        enum:
        - student
        - teacher
        - school_admin
        - super_admin
        example: student
      school_id:
        description: UUID школы
        example: 3e1b8139-1f9d-458f-ac70-41f815c8b128
        type: string
      updated_at:
        description: Дата обновления
        example: "2026-03-16T10:30:00Z"
        type: string
    type: object
info:
  contact: {}
  description: API description
  title: API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Выполняет вход по email и паролю, возвращает пару токенов.
      parameters:
      - description: Учётные данные
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Неверный email или пароль
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Аутентификация
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Инвалидирует переданный refresh token.
      parameters:
      - description: Refresh token текущей сессии
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.LogoutResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Выход из текущей сессии
      tags:
      - auth
  /auth/logout-all:
    post:
      description: Инвалидирует все refresh token текущего пользователя и увеличивает
        версию сессии.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.LogoutResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Выход со всех устройств
      tags:
      - auth
  /auth/me:
    get:
      description: Возвращает данные авторизованного пользователя по JWT.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.GetMeResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Текущий пользователь
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Принимает refresh token и user_id, возвращает новую пару access
        + refresh.
      parameters:
      - description: Refresh token и ID пользователя
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.RefreshResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Невалидный или истёкший refresh token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Обновление токенов
      tags:
      - auth
  /auth/registration:
    post:
      consumes:
      - application/json
      description: Создаёт нового пользователя с ролью student и возвращает пару токенов.
      parameters:
      - description: Данные регистрации
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.RegistrationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.RegistrationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Email уже зарегистрирован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Самостоятельная регистрация
      tags:
      - auth
  /auth/registration/admin:
    post:
      consumes:
      - application/json
      description: Создаёт пользователя с указанной ролью и генерирует временный пароль.
        Для school_admin school_id подставляется автоматически из токена.
      parameters:
      - description: Данные нового пользователя
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.RegistrationRequestByAdmin'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.RegistrationResponseByAdmin'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Недостаточно прав
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Email уже зарегистрирован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Создание пользователя админом
      tags:
      - auth
  /infra/health:
    get:
      description: Возвращает успешный ответ, если HTTP-сервис запущен и способен
        обрабатывать запросы.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.HealthResponse'
      summary: Проверка доступности сервиса
      tags:
      - infra
  /infra/metrics:
    get:
      description: Возвращает метрики приложения в формате Prometheus для внешнего
        сбора и мониторинга.
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Метрики приложения
      tags:
      - infra
  /infra/ready:
    get:
      description: Проверяет готовность приложения к обработке трафика и доступность
        критичных зависимостей, таких как база данных и кэш.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ReadyResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Проверка готовности сервиса
      tags:
      - infra
  /interests:
    get:
      description: Возвращает список интересов с фильтрацией и пагинацией.
      parameters:
      - description: Поиск по названию
