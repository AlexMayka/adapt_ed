basePath: /
definitions:
  auth.GetMeResponse:
    properties:
      avatar_key:
        description: Ключ аватара в S3-хранилище
        example: avatars/10cb44c1/photo.png
        type: string
      class_id:
        description: UUID класса пользователя
        example: 1db34ac1-23f1-4b47-82e3-9e8ad16ee1fb
        type: string
      created_at:
        description: Дата создания пользователя
        example: "2026-03-16T10:30:00Z"
        type: string
      email:
        description: Email пользователя
        example: example@example.com
        type: string
      first_name:
        description: Имя пользователя
        example: Иван
        type: string
      id:
        description: UUID пользователя
        example: 10cb44c1-18f7-4a3e-b0bd-5d2609619d65
        type: string
      is_active:
        description: Признак активности пользователя
        example: true
        type: boolean
      last_name:
        description: Фамилия пользователя
        example: Иванов
        type: string
      middle_name:
        description: Отчество пользователя, если имеется
        example: Иванович
        type: string
      role:
        allOf:
        - $ref: '#/definitions/dto.UserRole'
        description: Роль пользователя в системе
        enum:
        - student
        - teacher
        - school_admin
        - super_admin
        example: student
      school_id:
        description: UUID школы пользователя
        example: 3e1b8139-1f9d-458f-ac70-41f815c8b128
        type: string
      updated_at:
        description: Дата последнего обновления пользователя
        example: "2026-03-16T10:30:00Z"
        type: string
    required:
    - email
    - first_name
    - last_name
    - role
    type: object
  auth.LoginRequest:
    properties:
      email:
        description: Email пользователя
        example: example@example.com
        type: string
      password:
        description: Пароль пользователя, минимум 8 символов
        example: NFMpC9!fm;ARqoh
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  auth.LoginResponse:
    properties:
      access_token:
        description: JWT access token
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      class_id:
        description: UUID класса пользователя
        example: 1db34ac1-23f1-4b47-82e3-9e8ad16ee1fb
        type: string
      created_at:
        description: Дата создания пользователя
        example: "2026-03-16T10:30:00Z"
        type: string
      email:
        description: Email пользователя
        example: example@example.com
        type: string
      first_name:
        description: Имя пользователя
        example: Иван
        type: string
      id:
        description: UUID пользователя
        example: 10cb44c1-18f7-4a3e-b0bd-5d2609619d65
        type: string
      is_active:
        description: Признак активности пользователя
        example: true
        type: boolean
      last_name:
        description: Фамилия пользователя
        example: Иванов
        type: string
      middle_name:
        description: Отчество пользователя, если имеется
        example: Иванович
        type: string
      refresh_token:
        description: Refresh token для обновления access token
        example: b7d0e8d1-47d8-4d3e-8c2b-7b1d0e8a1234
        type: string
      role:
        allOf:
        - $ref: '#/definitions/dto.UserRole'
        description: Роль пользователя в системе
        enum:
        - student
        - teacher
        - school_admin
        - super_admin
