securityDefinitions:
  BearerAuth:
    description: 'Введите токен в формате: Bearer {access_token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
tags:
- description: 'Служебные эндпоинты приложения: доступность, готовность и метрики
    мониторинга.'
