      parameters:
      - description: UUID школы
        in: path
        name: id
        required: true
        type: string
      - description: Обновляемые поля
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/school.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/school.SchoolResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Недостаточно прав
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Школа не найдена
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Обновление школы
      tags:
      - schools
  /schools/{id}/restore:
    post:
      description: Восстанавливает мягко удалённую школу. Доступно только super_admin.
