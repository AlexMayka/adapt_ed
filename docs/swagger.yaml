      - application/json
      description: Создаёт новый верифицированный интерес. Доступно только super_admin.
      parameters:
      - description: Данные интереса
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/interest.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/interest.InterestResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Интерес уже существует
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Создание интереса
      tags:
      - interests
  /interests/{id}:
    delete:
      description: Физически удаляет интерес из справочника. Доступно только super_admin.
      parameters:
      - description: UUID интереса
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/interest.InterestID'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Удаление интереса
      tags:
      - interests
    patch:
      consumes:
      - application/json
      description: Обновляет название или иконку интереса. Доступно только super_admin.
      parameters:
      - description: UUID интереса
        in: path
        name: id
        required: true
        type: string
      - description: Обновляемые поля
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/interest.UpdateRequest'
      produces:
      - application/json
      responses:
