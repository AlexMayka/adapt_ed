          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получение школы
      tags:
      - schools
    patch:
      consumes:
      - application/json
      description: Обновляет данные школы. Доступно super_admin и school_admin своей
