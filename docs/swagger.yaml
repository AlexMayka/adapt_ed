      school_id:
        description: UUID школы пользователя
        example: 3e1b8139-1f9d-458f-ac70-41f815c8b128
        type: string
      updated_at:
        description: Дата последнего обновления пользователя
        example: "2026-03-16T10:30:00Z"
        type: string
    required:
    - email
    - first_name
    - last_name
    - role
    type: object
  auth.LogoutRequest:
    properties:
      refresh_token:
        description: Refresh token текущей сессии
        example: b7d0e8d1-47d8-4d3e-8c2b-7b1d0e8a1234
        type: string
    required:
    - refresh_token
    type: object
  auth.LogoutResponse:
    properties:
      id:
        description: UUID пользователя
        example: 10cb44c1-18f7-4a3e-b0bd-5d2609619d65
        type: string
    type: object
  auth.RefreshRequest:
    properties:
      refresh_token:
        description: Текущий refresh token
        example: b7d0e8d1-47d8-4d3e-8c2b-7b1d0e8a1234
        type: string
      user_id:
        description: UUID пользователя
        example: 10cb44c1-18f7-4a3e-b0bd-5d2609619d65
        type: string
    required:
    - refresh_token
    - user_id
    type: object
  auth.RefreshResponse:
    properties:
      access_token:
        description: JWT access token
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      refresh_token:
        description: Refresh token для обновления access token
        example: b7d0e8d1-47d8-4d3e-8c2b-7b1d0e8a1234
        type: string
    type: object
  auth.RegistrationRequest:
    properties:
      email:
