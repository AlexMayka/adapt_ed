        in: query
        name: city
        type: string
      - description: Количество записей (по умолчанию 20, макс 100)
        in: query
        name: limit
        type: integer
      - description: Смещение (по умолчанию 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
