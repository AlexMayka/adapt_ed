    - first_name
    - last_name
    - role
    type: object
  auth.LoginRequest:
    properties:
      email:
        example: example@example.com
        type: string
      password:
        example: NFMpC9!fm;ARqoh
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  auth.LoginResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
