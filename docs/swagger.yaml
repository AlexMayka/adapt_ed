  auth.RegistrationResponseByAdmin:
    properties:
      class_id:
        example: 1db34ac1-23f1-4b47-82e3-9e8ad16ee1fb
        type: string
      created_at:
        example: "2026-03-16T10:30:00Z"
        type: string
      email:
        example: example@example.com
        type: string
      first_name:
        example: Иван
        type: string
      id:
        example: 10cb44c1-18f7-4a3e-b0bd-5d2609619d65
        type: string
      is_active:
        example: true
        type: boolean
      last_name:
        example: Иванов
        type: string
      middle_name:
        example: Иванович
        type: string
      password:
        example: NFMpC9!fm;ARqoh
