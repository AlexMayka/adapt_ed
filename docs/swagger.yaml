    - email
    - first_name
    - last_name
    - role
    type: object
  class.ClassID:
    properties:
      id:
        description: UUID класса
        example: 1db34ac1-23f1-4b47-82e3-9e8ad16ee1fb
        type: string
    type: object
  class.ClassResponse:
    properties:
      academic_year_end:
        description: Дата окончания учебного года
        example: "2026-08-31T00:00:00Z"
